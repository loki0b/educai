services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: api:latest
    ports:
      - "${APP_PORT}:5000"
    volumes:
      - .:/app
    depends_on: 
      - db
    environment:
      - FLASK_APP=${FLASK_APP}
      - DB_HOST=db
      - DB_NAME=${POSTGRES_DB}
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}

  db:
    image: postgres:17.10
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}