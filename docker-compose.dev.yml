services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    image: api:latest
    ports:
      - "${API_PORT}:5000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    environment:
      - FLASK_APP=${FLASK_APP}
      - PYTHONPATH=/app/src
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - DB_HOST=db
      - DB_NAME=${POSTGRES_DB}
      - DB_USER=${POSTGRES_USER}
      - DB_PORT=${DB_PORT}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
  
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    image: frontend:latest
    ports:
      - "${FRONT_PORT}:3000"
    depends_on:
      - api
    volumes:
      - ./frontend:/app
      - /app/node_modules

  db:
    image: postgres:17.10
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s