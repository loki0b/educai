name: CI/CD

on:
  push:
    branches:
        - main

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Cloning
        uses: actions/checkout@v4

      - name: Installing Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
        
      - name: Installing dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install black flake8

      - name: Running black
        run: python -m black --check .

      - name: Running flake8
        run: python -m flake8 .

  cd:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Cloning
        uses: actions/checkout@v4

      - name: Building
        run: docker build -f Dockerfile.prod -t educai:latest . 